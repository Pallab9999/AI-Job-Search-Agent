name: Daily Job Scrape

on:
  schedule:
    - cron: '0 8 * * *' # 8 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v3
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'
        
    - name: Install Chrome and dependencies for Selenium
      run: |
        sudo apt-get update
        sudo apt-get install -y google-chrome-stable
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Job Agent
      env:
        EMAIL: ${{ secrets.EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
      run: |
        python main.py --once
        
    - name: Commit and push updated seen jobs
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/seen_jobs.json || echo "No changes to commit"
        git commit -m "Update seen jobs [skip ci]" || echo "No changes to commit"
        git push || echo "No changes to push"
