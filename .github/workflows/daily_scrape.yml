name: Daily Job Scrape

on:
  schedule:
    - cron: '0 8 * * *' # 8 AM UTC daily
  workflow_dispatch: # Allow manual trigger

jobs:
  scrape-jobs:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
        cache: 'pip'
        
    - name: Install Chrome for Selenium
      uses: browser-actions/setup-chrome@v1
      with:
        chrome-version: 'stable'
        
    - name: Create required directories
      run: |
        mkdir -p data logs output/cover_letters assets
        
    - name: Install Python dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Job Agent
      env:
        EMAIL: ${{ secrets.EMAIL }}
        EMAIL_PASSWORD: ${{ secrets.EMAIL_PASSWORD }}
        MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
        SMTP_SERVER: ${{ secrets.SMTP_SERVER }}
        SMTP_PORT: ${{ secrets.SMTP_PORT }}
        CI: 'true'
      run: |
        python main.py --once --config config.json
        
    - name: Commit and push updated data
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add data/seen_jobs.json data/recent_matches.json data/email_queue.json || true
        git add -f output/ || true
        git diff --cached --quiet || git commit -m "Update job data [skip ci]"
        git push || echo "Nothing to push"
